<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equity + Drawdown</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --card: #161616;
    --border: #262626;
    --text: #e5e5e5;
    --muted: #888888;
    --green: #4ade80;
    --red: #f87171;
    --grid: #1f1f1f;
  }
  body.light {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --card: #ffffff;
    --border: #e2e2e2;
    --text: #1a1a1a;
    --muted: #666666;
    --grid: #eeeeee;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  /* Icon-only circular toggle button */
  #themeToggle {
    width: 34px;
    height: 34px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  #themeToggle:hover {
    border-color: var(--muted);
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .tab:hover {
    color: var(--text);
  }
  .tab.active {
    color: var(--text);
    border-bottom: 2px solid var(--green);
    font-weight: 500;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 500;
    margin-top: 4px;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .mainRow {
    display: flex;
    gap: 20px;
    align-items: stretch;
  }
  #chartWrap {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    height: 420px;
  }
  #winLossWrap {
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  #winLossWrap h3 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px 0;
  }
  .winLossLegend {
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .legendDot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  #status {
    color: var(--muted);
    font-size: 13px;
  }
  .comingSoon {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="pageTitle">Equity + Drawdown</h1>
    <div class="subtitle">Live from your Notion trades database</div>
  </div>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab" data-tab="daily">Daily</button>
  <button class="tab active" data-tab="equity">Equity</button>
  <button class="tab" data-tab="setups">Setups</button>
  <button class="tab" data-tab="monthly">Monthly</button>
  <button class="tab" data-tab="sessions">Sessions</button>
  <button class="tab" data-tab="returns">Return %</button>
  <button class="tab" data-tab="curve">Curve</button>
  <button class="tab" data-tab="accounts">Accounts</button>
</div>

<div id="equityView">
  <div id="status">Loading...</div>
  <div class="stats" id="stats" style="display:none"></div>
  <div class="mainRow" id="mainRow" style="display:none">
    <div id="chartWrap">
      <canvas id="equityChart"></canvas>
    </div>
    <div id="winLossWrap">
      <h3>Win-Loss Ratio</h3>
      <div style="position: relative; flex: 1;">
        <canvas id="winLossChart"></canvas>
      </div>
      <div class="winLossLegend">
        <span><span class="legendDot" style="background:#4ade80"></span>Win</span>
        <span><span class="legendDot" style="background:#f87171"></span>Loss</span>
      </div>
    </div>
  </div>
</div>

<div id="comingSoonView" class="comingSoon" style="display:none">
  This view isn't built yet — coming soon.
</div>

<div id="monthlyView" style="display:none">
  <div id="monthlyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="monthlyChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="monthlyChart"></canvas>
  </div>
</div>

<div id="sessionsView" style="display:none">
  <div id="sessionsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="sessionsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="sessionsChart"></canvas>
  </div>
</div>

<div id="setupsView" style="display:none">
  <div id="setupsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="setupsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="setupsChart"></canvas>
  </div>
</div>

<div id="dailyView" style="display:none">
  <div id="dailyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="dailyChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="dailyChart"></canvas>
  </div>
</div>

<div id="returnsView" style="display:none">
  <div id="returnsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="returnsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="returnsChart"></canvas>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

const API_URL = "https://tsb-backend-production.up.railway.app/equity-curve";
const WIN_LOSS_API_URL = "https://tsb-backend-production.up.railway.app/win-loss";

let chartInstance = null;
let winLossChartInstance = null;
let cachedData = null;
let cachedWinLoss = null;

// Draws "62% / Win Rate" text centered inside the donut hole — Chart.js
// doesn't support this natively, so this is a small custom plugin.
const centerTextPlugin = {
  id: "centerText",
  afterDraw(chart) {
    if (chart.config.type !== "doughnut") return;
    const { ctx, chartArea } = chart;
    const winRate = chart.config._winRate;
    if (winRate === undefined) return;

    const centerX = (chartArea.left + chartArea.right) / 2;
    const centerY = (chartArea.top + chartArea.bottom) / 2;
    const isLight = document.body.classList.contains("light");

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = isLight ? "#1a1a1a" : "#e5e5e5";
    ctx.font = "600 26px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText(winRate + "%", centerX, centerY - 8);
    ctx.fillStyle = isLight ? "#666666" : "#888888";
    ctx.font = "12px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText("Win Rate", centerX, centerY + 14);
    ctx.restore();
  },
};
Chart.register(centerTextPlugin);

// ---------- Theme toggle (icon only) ----------
function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  const btn = document.getElementById("themeToggle");
  btn.textContent = isLight ? "☀️" : "🌙";
  if (cachedData) renderChart(cachedData.points);
  if (cachedWinLoss) renderWinLoss(cachedWinLoss);
}

// ---------- Tab switching ----------
document.querySelectorAll(".tab").forEach(tabBtn => {
  tabBtn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tabBtn.classList.add("active");

    const tab = tabBtn.dataset.tab;
    const title = document.getElementById("pageTitle");
    const equityView = document.getElementById("equityView");
    const comingSoon = document.getElementById("comingSoonView");
    const monthlyView = document.getElementById("monthlyView");
    const sessionsView = document.getElementById("sessionsView");
    const setupsView = document.getElementById("setupsView");
    const dailyView = document.getElementById("dailyView");
    const returnsView = document.getElementById("returnsView");

    equityView.style.display = "none";
    comingSoon.style.display = "none";
    monthlyView.style.display = "none";
    sessionsView.style.display = "none";
    setupsView.style.display = "none";
    dailyView.style.display = "none";
    returnsView.style.display = "none";

    if (tab === "equity") {
      title.textContent = "Equity + Drawdown";
      equityView.style.display = "block";
    } else if (tab === "monthly") {
      title.textContent = "Monthly P&L";
      monthlyView.style.display = "block";
      if (!cachedMonthly) loadMonthly();
    } else if (tab === "sessions") {
      title.textContent = "Sessions P&L";
      sessionsView.style.display = "block";
      if (!cachedSessions) loadSessions();
    } else if (tab === "setups") {
      title.textContent = "Setups Performance";
      setupsView.style.display = "block";
      if (!cachedSetups) loadSetups();
    } else if (tab === "daily") {
      title.textContent = "Daily P&L";
      dailyView.style.display = "block";
      if (!cachedDaily) loadDaily();
    } else if (tab === "returns") {
      title.textContent = "Return %";
      returnsView.style.display = "block";
      loadReturns();
    } else {
      title.textContent = tabBtn.textContent;
      comingSoon.style.display = "block";
    }
  });
});

let returnsChartInstance = null;

// Unlike the other tabs, this doesn't need its own fetch — it reuses the
// equity data already loaded for the Equity tab and just recomputes it
// as a percentage instead of dollars.
function loadReturns() {
  const statusEl = document.getElementById("returnsStatus");
  const wrapEl = document.getElementById("returnsChartWrap");

  if (!cachedData || !cachedData.points || cachedData.points.length === 0) {
    statusEl.textContent = "Equity data not loaded yet — try the Equity tab first.";
    return;
  }

  renderReturns(cachedData.points, cachedData.summary.starting_balance);
  statusEl.style.display = "none";
  wrapEl.style.display = "block";
}

function renderReturns(points, startingBalance) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  // Convert dollar equity into % return relative to the starting balance —
  // same underlying data as the Equity tab, different lens on it.
  const returnsPct = points.map(p =>
    ((p.equity - startingBalance) / startingBalance) * 100
  );
  const colors = returnsPct.map(v => v >= 0 ? "#4ade80" : "#f87171");

  const ctx = document.getElementById("returnsChart").getContext("2d");
  if (returnsChartInstance) returnsChartInstance.destroy();

  const gradient = ctx.createLinearGradient(0, 0, 0, 380);
  gradient.addColorStop(0, "rgba(74, 222, 128, 0.25)");
  gradient.addColorStop(1, "rgba(74, 222, 128, 0.0)");

  returnsChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Return %",
        data: returnsPct,
        borderColor: "#4ade80",
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointBackgroundColor: "#4ade80",
        datalabels: {
          display: (ctx) => ctx.dataIndex === 0 || ctx.dataIndex === returnsPct.length - 1,
          align: "top",
          color: textColor,
          font: { size: 11, weight: "500" },
          formatter: (v) => v.toFixed(2) + "%",
        },
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor } },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => v + "%" },
        },
      },
    },
  });
}

let dailyChartInstance = null;
let cachedDaily = null;

async function loadDaily() {
  const statusEl = document.getElementById("dailyStatus");
  const wrapEl = document.getElementById("dailyChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/daily-pnl");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedDaily = data.days;

    if (!cachedDaily || cachedDaily.length === 0) {
      statusEl.textContent = "No trade data yet.";
      return;
    }

    renderDaily(cachedDaily);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load daily data (" + err.message + ")";
  }
}

function renderDaily(days) {
  const isLight = document.body.classList.contains("light");
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = days.map(d => d.day);
  const pnl = days.map(d => d.pnl);
  const colors = pnl.map(v => v >= 0 ? "#4ade80" : "#f87171");

  const ctx = document.getElementById("dailyChart").getContext("2d");
  if (dailyChartInstance) dailyChartInstance.destroy();

  dailyChartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Daily P&L",
        data: pnl,
        backgroundColor: colors,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: "end",
          align: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? "top" : "bottom",
          color: mutedColor,
          font: { size: 10 },
          formatter: (v) => formatCompact(v),
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: mutedColor, maxTicksLimit: 10 } },
        y: {
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => formatCompact(v) },
        },
      },
    },
  });
}

let setupsChartInstance = null;
let cachedSetups = null;

async function loadSetups() {
  const statusEl = document.getElementById("setupsStatus");
  const wrapEl = document.getElementById("setupsChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/setups");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedSetups = data.setups;

    if (!cachedSetups || cachedSetups.length === 0) {
      statusEl.textContent = "No setups with trades yet.";
      return;
    }

    renderSetups(cachedSetups);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load setups data (" + err.message + ")";
  }
}

function renderSetups(setups) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = setups.map(s => s.name);
  const winRates = setups.map(s => s.win_rate);
  const colors = winRates.map(v => v >= 50 ? "#4ade80" : "#f87171");

  const ctx = document.getElementById("setupsChart").getContext("2d");
  if (setupsChartInstance) setupsChartInstance.destroy();

  setupsChartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Win Rate %",
        data: winRates,
        backgroundColor: colors,
        borderRadius: 4,
      }],
    },
    options: {
      indexAxis: "y", // horizontal bars — reads better with setup names as labels
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: "end",
          align: "end",
          color: textColor,
          font: { size: 11 },
          formatter: (v, ctx) => {
            const s = setups[ctx.dataIndex];
            return `${v}% (${s.times_used} trades, ${s.avg_r}R avg)`;
          },
        },
      },
      scales: {
        x: {
          max: 100,
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => v + "%" },
        },
        y: { grid: { display: false }, ticks: { color: mutedColor } },
      },
    },
  });
}

let sessionsChartInstance = null;
let cachedSessions = null;

  const statusEl = document.getElementById("sessionsStatus");
  const wrapEl = document.getElementById("sessionsChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/sessions-pnl");

function renderSessions(sessions) {

  const labels = sessions.map(s => s.session);
  const pnl = sessions.map(s => s.pnl);
  const colors = pnl.map(v => v >= 0 ? "#4ade80" : "#f87171");

  sessionsChartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{

        data: pnl,
        backgroundColor: colors,

    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: "end",
          align: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? "top" : "bottom",
          color: mutedColor,
          font: { size: 11 },
          formatter: (v) => formatCompact(v),
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: mutedColor } },
        y: {
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => formatCompact(v) },
        },
      },
    },
  });

let monthlyChartInstance = null;
let cachedMonthly = null;

async function loadMonthly() {
  const statusEl = document.getElementById("monthlyStatus");
  const wrapEl = document.getElementById("monthlyChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/monthly-pnl");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedMonthly = data.months;

    if (!cachedMonthly || cachedMonthly.length === 0) {
      statusEl.textContent = "No trade data yet.";
      return;
    }

    renderMonthly(cachedMonthly);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load monthly data (" + err.message + ")";
  }
}

function renderMonthly(months) {
  const isLight = document.body.classList.contains("light");
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = months.map(m => m.month);
  const pnl = months.map(m => m.pnl);
  const colors = pnl.map(v => v >= 0 ? "#4ade80" : "#f87171");

  const ctx = document.getElementById("monthlyChart").getContext("2d");
  if (monthlyChartInstance) monthlyChartInstance.destroy();

  monthlyChartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Monthly P&L",
        data: pnl,
        backgroundColor: colors,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: "end",
          align: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? "top" : "bottom",
          color: mutedColor,
          font: { size: 11 },
          formatter: (v) => formatCompact(v),
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: mutedColor } },
        y: {
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => formatCompact(v) },
        },
      },
    },
  });
}

// ---------- Helpers ----------
function formatCompact(v) {
  // Turns 12345 into "$12.3K", -305 into "-$305", matching the TSB-style labels
  const sign = v < 0 ? "-" : "";
  const abs = Math.abs(v);
  if (abs >= 1000) return sign + "$" + (abs / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return sign + "$" + abs.toLocaleString();
}

// ---------- Data + chart ----------
async function loadChart() {
  const statusEl = document.getElementById("status");
  try {
    const [equityRes, winLossRes] = await Promise.all([
      fetch(API_URL),
      fetch(WIN_LOSS_API_URL),
    ]);

    if (!equityRes.ok) throw new Error(`Equity server responded ${equityRes.status}`);
    const data = await equityRes.json();
    cachedData = data;

    if (!data.points || data.points.length === 0) {
      statusEl.textContent = "No trade data returned yet — log some trades first.";
      return;
    }

    if (winLossRes.ok) {
      cachedWinLoss = await winLossRes.json();
      renderWinLoss(cachedWinLoss);
    }

    renderStats(data.summary);
    renderChart(data.points);

    statusEl.style.display = "none";
    document.getElementById("stats").style.display = "flex";
    document.getElementById("mainRow").style.display = "flex";
  } catch (err) {
    statusEl.textContent =
      "Couldn't reach the server at " + API_URL + " (" + err.message + ")";
  }
}

function renderWinLoss(data) {
  const ctx = document.getElementById("winLossChart").getContext("2d");

  if (winLossChartInstance) {
    winLossChartInstance.destroy();
  }

  winLossChartInstance = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Win", "Loss"],
      datasets: [{
        data: [data.wins, data.losses],
        backgroundColor: ["#4ade80", "#f87171"],
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "72%",
      plugins: {
        legend: { display: false },
        tooltip: { enabled: true },
        datalabels: { display: false },
      },
    },
  });
  winLossChartInstance.config._winRate = data.win_rate;
  winLossChartInstance.update();
}

function renderStats(summary) {
  const statsEl = document.getElementById("stats");
  const pnlClass = summary.final_equity >= summary.starting_balance ? "positive" : "negative";

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Starting balance</div>
      <div class="stat-value">$${summary.starting_balance.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current equity</div>
      <div class="stat-value ${pnlClass}">$${summary.final_equity.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Max drawdown</div>
      <div class="stat-value negative">$${summary.max_drawdown.toLocaleString()}</div>
    </div>
  `;
}

function renderChart(points) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const equity = points.map(p => p.equity);
  const drawdown = points.map(p => p.drawdown);

  const ctx = document.getElementById("equityChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  // Soft vertical gradient fill under the equity line — fades from green to
  // transparent, which is what gives the TSB chart its "glow" look instead
  // of a flat solid fill.
  const equityGradient = ctx.createLinearGradient(0, 0, 0, 380);
  equityGradient.addColorStop(0, "rgba(74, 222, 128, 0.25)");
  equityGradient.addColorStop(1, "rgba(74, 222, 128, 0.0)");

  const drawdownGradient = ctx.createLinearGradient(0, 0, 0, 380);
  drawdownGradient.addColorStop(0, "rgba(248, 113, 113, 0.20)");
  drawdownGradient.addColorStop(1, "rgba(248, 113, 113, 0.0)");

  // Only label a handful of points (first, last, local peaks/troughs) —
  // labeling every single point gets cluttered fast on a real dataset.
  function shouldLabel(i) {
    if (i === 0 || i === equity.length - 1) return true;
    const prev = equity[i - 1], curr = equity[i], next = equity[i + 1];
    return (curr > prev && curr > next) || (curr < prev && curr < next);
  }

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Equity",
          data: equity,
          borderColor: "#4ade80",
          backgroundColor: equityGradient,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          yAxisID: "y",
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: "#4ade80",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "top",
            offset: 6,
            color: textColor,
            font: { size: 11, weight: "500" },
            formatter: (v) => formatCompact(v),
          },
        },
        {
          label: "Drawdown",
          data: drawdown,
          borderColor: "#f87171",
          backgroundColor: drawdownGradient,
          borderWidth: 1.5,
          fill: true,
          tension: 0.35,
          yAxisID: "y1",
          pointRadius: 0,
          pointHoverRadius: 4,
          pointBackgroundColor: "#f87171",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "bottom",
            offset: 6,
            color: mutedColor,
            font: { size: 10 },
            formatter: (v) => formatCompact(v),
          },
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: { color: textColor },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          position: "left",
          grid: { color: gridColor },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
        y1: {
          position: "right",
          suggestedMax: 0,
          grid: { drawOnChartArea: false },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
      },
    },
  });
}

loadChart();
</script>
