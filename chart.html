<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equity + Drawdown</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Trading-terminal dark palette, closer to Binance/TradingView than a
       generic dark theme — deep near-black background, saturated green/red
       rather than pastel, so P&L reads with the same weight it would on a
       real exchange. */
    --bg: #0b0e11;
    --panel: #14181d;
    --card: #181c22;
    --border: #262b33;
    --border-soft: #1e222a;
    --text: #eaecef;
    --muted: #848e9c;
    --green: #0ecb81;
    --green-dim: rgba(14, 203, 129, 0.12);
    --red: #f6465d;
    --red-dim: rgba(246, 70, 93, 0.12);
    --grid: #1a1e24;
    --accent-glow: rgba(14, 203, 129, 0.35);
  }
  body.light {
    --bg: #f8f9fa;
    --panel: #ffffff;
    --card: #ffffff;
    --border: #e7e9ec;
    --border-soft: #eef0f2;
    --text: #12161c;
    --muted: #707a8a;
    --grid: #eef0f2;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
    transition: background 0.15s ease, color 0.15s ease;
    -webkit-font-smoothing: antialiased;
  }

  /* All numeric/price values use the mono face with tabular figures — the
     one detail that most separates a "real" trading UI from a dashboard
     mockup: digits align vertically no matter what number's shown. */
  .mono, .stat-value, .price-mono {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  h1 {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 22px;
    font-weight: 500;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  #themeToggle {
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  #themeToggle:hover {
    border-color: var(--green);
    transform: translateY(-1px);
  }

  /* Pill-style segmented tab bar — active tab gets a solid tinted fill,
     like Binance's market-type switcher, rather than a plain underline. */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 22px;
    overflow-x: auto;
    width: fit-content;
    max-width: 100%;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .tab:hover {
    color: var(--text);
    background: var(--border-soft);
  }
  .tab.active {
    color: #05130d;
    background: var(--green);
  }
  body.light .tab.active {
    color: #ffffff;
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 140px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Inter', sans-serif;
  }
  .stat-value {
    font-size: 21px;
    font-weight: 600;
    margin-top: 5px;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .mainRow {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }
  #chartWrap {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    height: 420px;
  }
  #winLossWrap {
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  #winLossWrap h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px 0;
    font-family: 'Inter', sans-serif;
  }
  .winLossLegend {
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 8px;
  }
  .legendDot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  #status {
    color: var(--muted);
    font-size: 13px;
  }
  .comingSoon {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="pageTitle">Equity + Drawdown</h1>
    <div class="subtitle">Live from your Notion trades database</div>
  </div>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab" data-tab="daily">Daily</button>
  <button class="tab active" data-tab="equity">Equity</button>
  <button class="tab" data-tab="setups">Setups</button>
  <button class="tab" data-tab="monthly">Monthly</button>
  <button class="tab" data-tab="sessions">Sessions</button>
  <button class="tab" data-tab="returns">Return %</button>
  <button class="tab" data-tab="curve">Curve</button>
  <button class="tab" data-tab="accounts">Accounts</button>
</div>

<div id="equityView">
  <div id="status">Loading...</div>
  <div class="stats" id="stats" style="display:none"></div>
  <div class="mainRow" id="mainRow" style="display:none">
    <div id="chartWrap">
      <canvas id="equityChart"></canvas>
    </div>
    <div id="winLossWrap">
      <h3>Win-Loss Ratio</h3>
      <div style="position: relative; flex: 1;">
        <canvas id="winLossChart"></canvas>
      </div>
      <div class="winLossLegend">
        <span><span class="legendDot" style="background:#0ecb81"></span>Win</span>
        <span><span class="legendDot" style="background:#f6465d"></span>Loss</span>
      </div>
    </div>
  </div>
</div>

<div id="comingSoonView" class="comingSoon" style="display:none">
  This view isn't built yet — coming soon.
</div>

<div id="monthlyView" style="display:none">
  <div id="monthlyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="monthlyChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="monthlyChart"></canvas>
  </div>
</div>

<div id="sessionsView" style="display:none">
  <div id="sessionsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="sessionsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="sessionsChart"></canvas>
  </div>
</div>

<div id="setupsView" style="display:none">
  <div id="setupsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="setupsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="setupsChart"></canvas>
  </div>
</div>

<div id="dailyView" style="display:none">
  <div id="dailyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="dailyChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="dailyChart"></canvas>
  </div>
</div>

<div id="returnsView" style="display:none">
  <div id="returnsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="returnsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="returnsChart"></canvas>
  </div>
</div>

<div id="curveView" style="display:none">
  <div id="curveStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="curveChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="curveChart"></canvas>
  </div>
</div>

<div id="accountsView" style="display:none">
  <div id="accountsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="accountsCards" style="display:none; display:flex; gap: 20px; flex-wrap: wrap;"></div>
</div>

<script>
Chart.register(ChartDataLabels);

const API_URL = "https://tsb-backend-production.up.railway.app/equity-curve";
const WIN_LOSS_API_URL = "https://tsb-backend-production.up.railway.app/win-loss";

let chartInstance = null;
let winLossChartInstance = null;
let cachedData = null;
let cachedWinLoss = null;

// Draws "62% / Win Rate" text centered inside the donut hole — Chart.js
// doesn't support this natively, so this is a small custom plugin.
const centerTextPlugin = {
  id: "centerText",
  afterDraw(chart) {
    if (chart.config.type !== "doughnut") return;
    const { ctx, chartArea } = chart;
    const winRate = chart.config._winRate;
    if (winRate === undefined) return;

    const centerX = (chartArea.left + chartArea.right) / 2;
    const centerY = (chartArea.top + chartArea.bottom) / 2;
    const isLight = document.body.classList.contains("light");

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = isLight ? "#1a1a1a" : "#e5e5e5";
    ctx.font = "600 26px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText(winRate + "%", centerX, centerY - 8);
    ctx.fillStyle = isLight ? "#666666" : "#888888";
    ctx.font = "12px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText("Win Rate", centerX, centerY + 14);
    ctx.restore();
  },
};
Chart.register(centerTextPlugin);

// The vertical dashed line that follows your cursor across the chart —
// the one detail that visually signals "trading terminal" more than any
// color choice. Chart.js has no built-in crosshair, so this draws it
// manually on top of whatever point is currently active/hovered.
const crosshairPlugin = {
  id: "crosshair",
  afterDraw(chart) {
    if (chart.tooltip?._active?.length) {
      const activePoint = chart.tooltip._active[0];
      const { ctx, chartArea } = chart;
      const x = activePoint.element.x;

      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.lineWidth = 1;
      ctx.strokeStyle = document.body.classList.contains("light") ? "#c4c9d0" : "#3a4048";
      ctx.stroke();
      ctx.restore();
    }
  },
};
Chart.register(crosshairPlugin);

// ---------- Theme toggle (icon only) ----------
function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  const btn = document.getElementById("themeToggle");
  btn.textContent = isLight ? "☀️" : "🌙";
  if (cachedData) renderChart(cachedData.points);
  if (cachedWinLoss) renderWinLoss(cachedWinLoss);
}

// ---------- Tab switching ----------
document.querySelectorAll(".tab").forEach(tabBtn => {
  tabBtn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tabBtn.classList.add("active");

    const tab = tabBtn.dataset.tab;
    const title = document.getElementById("pageTitle");
    const equityView = document.getElementById("equityView");
    const comingSoon = document.getElementById("comingSoonView");
    const monthlyView = document.getElementById("monthlyView");
    const sessionsView = document.getElementById("sessionsView");
    const setupsView = document.getElementById("setupsView");
    const dailyView = document.getElementById("dailyView");
    const returnsView = document.getElementById("returnsView");
    const curveView = document.getElementById("curveView");
    const accountsView = document.getElementById("accountsView");

    equityView.style.display = "none";
    comingSoon.style.display = "none";
    monthlyView.style.display = "none";
    sessionsView.style.display = "none";
    setupsView.style.display = "none";
    dailyView.style.display = "none";
    returnsView.style.display = "none";
    curveView.style.display = "none";
    accountsView.style.display = "none";

    if (tab === "equity") {
      title.textContent = "Equity + Drawdown";
      equityView.style.display = "block";
    } else if (tab === "monthly") {
      title.textContent = "Monthly P&L";
      monthlyView.style.display = "block";
      if (!cachedMonthly) loadMonthly();
    } else if (tab === "sessions") {
      title.textContent = "Sessions P&L";
      sessionsView.style.display = "block";
      if (!cachedSessions) loadSessions();
    } else if (tab === "setups") {
      title.textContent = "Setups Performance";
      setupsView.style.display = "block";
      if (!cachedSetups) loadSetups();
    } else if (tab === "daily") {
      title.textContent = "Daily P&L";
      dailyView.style.display = "block";
      if (!cachedDaily) loadDaily();
    } else if (tab === "returns") {
      title.textContent = "Return %";
      returnsView.style.display = "block";
      loadReturns();
    } else if (tab === "curve") {
      title.textContent = "Cumulative R-Multiple Curve";
      curveView.style.display = "block";
      if (!cachedCurve) loadCurve();
    } else if (tab === "accounts") {
      title.textContent = "Accounts";
      accountsView.style.display = "block";
      if (!cachedAccounts) loadAccounts();
    } else {
      title.textContent = tabBtn.textContent;
      comingSoon.style.display = "block";
    }
  });
});

let cachedAccounts = null;

async function loadAccounts() {
  const statusEl = document.getElementById("accountsStatus");
  const cardsEl = document.getElementById("accountsCards");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/accounts");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedAccounts = data.accounts;

    if (!cachedAccounts || cachedAccounts.length === 0) {
      statusEl.textContent = "No accounts found.";
      return;
    }

    renderAccounts(cachedAccounts);
    statusEl.style.display = "none";
    cardsEl.style.display = "flex";
  } catch (err) {
    statusEl.textContent = "Couldn't load accounts data (" + err.message + ")";
  }
}

function renderAccounts(accounts) {
  const cardsEl = document.getElementById("accountsCards");

  cardsEl.innerHTML = accounts.map(acc => {
    const pnlClass = acc.total_pnl >= 0 ? "positive" : "negative";
    const statusColor = acc.status === "Active" ? "#0ecb81" : "#888888";

    return `
      <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-width: 260px; flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div style="font-size: 16px; font-weight: 600;">${acc.name}</div>
          <span style="font-size: 11px; padding: 3px 10px; border-radius: 20px; background: ${statusColor}22; color: ${statusColor};">${acc.status || "—"}</span>
        </div>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 4px;">${acc.type || ""}</div>
        <div style="display: flex; justify-content: space-between; margin-top: 16px;">
          <div>
            <div class="stat-label">Current Balance</div>
            <div class="stat-value">$${acc.current_balance.toLocaleString()}</div>
          </div>
          <div>
            <div class="stat-label">Total P&L</div>
            <div class="stat-value ${pnlClass}">$${acc.total_pnl.toLocaleString()}</div>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 16px;">
          <div>
            <div class="stat-label">Win Rate</div>
            <div class="stat-value">${acc.win_rate}%</div>
          </div>
          <div>
            <div class="stat-label">Trades</div>
            <div class="stat-value">${acc.trades}</div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

let curveChartInstance = null;
let cachedCurve = null;

async function loadCurve() {
  const statusEl = document.getElementById("curveStatus");
  const wrapEl = document.getElementById("curveChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/r-curve");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedCurve = data.curve;

    if (!cachedCurve || cachedCurve.length === 0) {
      statusEl.textContent = "No trade data yet.";
      return;
    }

    renderCurve(cachedCurve);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load curve data (" + err.message + ")";
  }
}

function renderCurve(curve) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = curve.map(c => "#" + c.trade_number);
  const cumulativeR = curve.map(c => c.cumulative_r);

  const ctx = document.getElementById("curveChart").getContext("2d");
  if (curveChartInstance) curveChartInstance.destroy();

  const gradient = ctx.createLinearGradient(0, 0, 0, 380);
  gradient.addColorStop(0, "rgba(14, 203, 129, 0.25)");
  gradient.addColorStop(1, "rgba(14, 203, 129, 0.0)");

  curveChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Cumulative R",
        data: cumulativeR,
        borderColor: "#0ecb81",
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.2,
        pointRadius: 3,
        pointBackgroundColor: "#0ecb81",
        datalabels: {
          display: (ctx) => ctx.dataIndex === 0 || ctx.dataIndex === cumulativeR.length - 1,
          align: "top",
          color: textColor,
          font: { size: 11, weight: "500" },
          formatter: (v) => v.toFixed(2) + "R",
        },
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor } },
      },
      scales: {
        x: {
          title: { display: true, text: "Trade #", color: mutedColor },
          grid: { display: false },
          ticks: { color: mutedColor },
        },
        y: {
          title: { display: true, text: "Cumulative R", color: mutedColor },
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => v + "R" },
        },
      },
    },
  });
}

let returnsChartInstance = null;

// Unlike the other tabs, this doesn't need its own fetch — it reuses the
// equity data already loaded for the Equity tab and just recomputes it
// as a percentage instead of dollars.
function loadReturns() {
  const statusEl = document.getElementById("returnsStatus");
  const wrapEl = document.getElementById("returnsChartWrap");

  if (!cachedData || !cachedData.points || cachedData.points.length === 0) {
    statusEl.textContent = "Equity data not loaded yet — try the Equity tab first.";
    return;
  }

  renderReturns(cachedData.points, cachedData.summary.starting_balance);
  statusEl.style.display = "none";
  wrapEl.style.display = "block";
}

function renderReturns(points, startingBalance) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  // Convert dollar equity into % return relative to the starting balance —
  // same underlying data as the Equity tab, different lens on it.
  const returnsPct = points.map(p =>
    ((p.equity - startingBalance) / startingBalance) * 100
  );
  const colors = returnsPct.map(v => v >= 0 ? "#0ecb81" : "#f6465d");

  const ctx = document.getElementById("returnsChart").getContext("2d");
  if (returnsChartInstance) returnsChartInstance.destroy();

  const gradient = ctx.createLinearGradient(0, 0, 0, 380);
  gradient.addColorStop(0, "rgba(14, 203, 129, 0.25)");
  gradient.addColorStop(1, "rgba(14, 203, 129, 0.0)");

  returnsChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Return %",
        data: returnsPct,
        borderColor: "#0ecb81",
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointBackgroundColor: "#0ecb81",
        datalabels: {
          display: (ctx) => ctx.dataIndex === 0 || ctx.dataIndex === returnsPct.length - 1,
          align: "top",
          color: textColor,
          font: { size: 11, weight: "500" },
          formatter: (v) => v.toFixed(2) + "%",
        },
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor } },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => v + "%" },
        },
      },
    },
  });
}

let dailyChartInstance = null;
let cachedDaily = null;

async function loadDaily() {
  const statusEl = document.getElementById("dailyStatus");
  const wrapEl = document.getElementById("dailyChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/daily-pnl");

// ---------- Helpers ----------
function formatCompact(v) {
  // Turns 12345 into "$12.3K", -305 into "-$305", matching the TSB-style labels
  const sign = v < 0 ? "-" : "";
  const abs = Math.abs(v);
  if (abs >= 1000) return sign + "$" + (abs / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return sign + "$" + abs.toLocaleString();
}

// ---------- Data + chart ----------
async function loadChart() {
  const statusEl = document.getElementById("status");
  try {
    const [equityRes, winLossRes] = await Promise.all([
      fetch(API_URL),
      fetch(WIN_LOSS_API_URL),
    ]);

    if (!equityRes.ok) throw new Error(`Equity server responded ${equityRes.status}`);
    const data = await equityRes.json();
    cachedData = data;

    if (!data.points || data.points.length === 0) {
      statusEl.textContent = "No trade data returned yet — log some trades first.";
      return;
    }

    if (winLossRes.ok) {
      cachedWinLoss = await winLossRes.json();
      renderWinLoss(cachedWinLoss);
    }

    renderStats(data.summary);
    renderChart(data.points);

    statusEl.style.display = "none";
    document.getElementById("stats").style.display = "flex";
    document.getElementById("mainRow").style.display = "flex";
  } catch (err) {
    statusEl.textContent =
      "Couldn't reach the server at " + API_URL + " (" + err.message + ")";
  }
}

function renderWinLoss(data) {
  const ctx = document.getElementById("winLossChart").getContext("2d");

  if (winLossChartInstance) {

  winLossChartInstance = new Chart(ctx, {

      datasets: [{
        data: [data.wins, data.losses],
        backgroundColor: ["#0ecb81", "#f6465d"],
        borderWidth: 0,

        tooltip: { enabled: true },
        datalabels: { display: false },

  });
  winLossChartInstance.config._winRate = data.win_rate;
  winLossChartInstance.update();
}

function renderStats(summary) {
  const statsEl = document.getElementById("stats");
  const pnlClass = summary.final_equity >= summary.starting_balance ? "positive" : "negative";

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Starting balance</div>
      <div class="stat-value">$${summary.starting_balance.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current equity</div>
      <div class="stat-value ${pnlClass}">$${summary.final_equity.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Max drawdown</div>
      <div class="stat-value negative">$${summary.max_drawdown.toLocaleString()}</div>
    </div>
  `;
}

function renderChart(points) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const equity = points.map(p => p.equity);
  const drawdown = points.map(p => p.drawdown);

  const ctx = document.getElementById("equityChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  // Soft vertical gradient fill under the equity line — fades from green to
  // transparent, which is what gives the TSB chart its "glow" look instead
  // of a flat solid fill.
  const equityGradient = ctx.createLinearGradient(0, 0, 0, 380);
  equityGradient.addColorStop(0, "rgba(14, 203, 129, 0.25)");
  equityGradient.addColorStop(1, "rgba(14, 203, 129, 0.0)");

  const drawdownGradient = ctx.createLinearGradient(0, 0, 0, 380);
  drawdownGradient.addColorStop(0, "rgba(246, 70, 93, 0.20)");
  drawdownGradient.addColorStop(1, "rgba(246, 70, 93, 0.0)");

  // Only label a handful of points (first, last, local peaks/troughs) —
  // labeling every single point gets cluttered fast on a real dataset.
  function shouldLabel(i) {
    if (i === 0 || i === equity.length - 1) return true;
    const prev = equity[i - 1], curr = equity[i], next = equity[i + 1];
    return (curr > prev && curr > next) || (curr < prev && curr < next);
  }

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Equity",
          data: equity,
          borderColor: "#0ecb81",
          backgroundColor: equityGradient,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          yAxisID: "y",
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: "#0ecb81",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "top",
            offset: 6,
            color: textColor,
            font: { size: 11, weight: "500" },
            formatter: (v) => formatCompact(v),
          },
        },
        {
          label: "Drawdown",
          data: drawdown,
          borderColor: "#f6465d",
          backgroundColor: drawdownGradient,
          borderWidth: 1.5,
          fill: true,
          tension: 0.35,
          yAxisID: "y1",
          pointRadius: 0,
          pointHoverRadius: 4,
          pointBackgroundColor: "#f6465d",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "bottom",
            offset: 6,
            color: mutedColor,
            font: { size: 10 },
            formatter: (v) => formatCompact(v),
          },
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: { color: textColor, font: { family: "'Inter', sans-serif", size: 12, weight: '600' } },
        },
        tooltip: {
          backgroundColor: isLight ? "#ffffff" : "#181c22",
          titleColor: textColor,
          bodyColor: textColor,
          borderColor: "#0ecb81",
          borderWidth: 1,
          padding: 10,
          titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12, weight: '600' },
          displayColors: true,
          boxPadding: 4,
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          position: "left",
          grid: { color: gridColor },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
        y1: {
          position: "right",
          suggestedMax: 0,
          grid: { drawOnChartArea: false },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
      },
    },
  });
}
