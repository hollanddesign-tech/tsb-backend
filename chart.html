<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equity + Drawdown</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --card: #161616;
    --border: #262626;
    --text: #e5e5e5;
    --muted: #888888;
    --green: #4ade80;
    --red: #f87171;
    --grid: #1f1f1f;
  }
  body.light {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --card: #ffffff;
    --border: #e2e2e2;
    --text: #1a1a1a;
    --muted: #666666;
    --grid: #eeeeee;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  /* Icon-only circular toggle button */
  #themeToggle {
    width: 34px;
    height: 34px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  #themeToggle:hover {
    border-color: var(--muted);
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .tab:hover {
    color: var(--text);
  }
  .tab.active {
    color: var(--text);
    border-bottom: 2px solid var(--green);
    font-weight: 500;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 500;
    margin-top: 4px;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  #chartWrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    height: 420px;
  }
  #status {
    color: var(--muted);
    font-size: 13px;
  }
  .comingSoon {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="pageTitle">Equity + Drawdown</h1>
    <div class="subtitle">Live from your Notion trades database</div>
  </div>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab" data-tab="daily">Daily</button>
  <button class="tab active" data-tab="equity">Equity</button>
  <button class="tab" data-tab="setups">Setups</button>
  <button class="tab" data-tab="monthly">Monthly</button>
  <button class="tab" data-tab="sessions">Sessions</button>
  <button class="tab" data-tab="returns">Return %</button>
  <button class="tab" data-tab="curve">Curve</button>
  <button class="tab" data-tab="accounts">Accounts</button>
</div>

<div id="equityView">
  <div id="status">Loading...</div>
  <div class="stats" id="stats" style="display:none"></div>
  <div id="chartWrap" style="display:none">
    <canvas id="equityChart"></canvas>
  </div>
</div>

<div id="comingSoonView" class="comingSoon" style="display:none">
  This view isn't built yet — coming soon.
</div>

<script>
Chart.register(ChartDataLabels);

const API_URL = "https://tsb-backend-production.up.railway.app/equity-curve";

let chartInstance = null;
let cachedData = null;

// ---------- Theme toggle (icon only) ----------
function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  const btn = document.getElementById("themeToggle");
  btn.textContent = isLight ? "☀️" : "🌙";
  if (cachedData) renderChart(cachedData.points);
}

// ---------- Tab switching ----------
document.querySelectorAll(".tab").forEach(tabBtn => {
  tabBtn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tabBtn.classList.add("active");

    const tab = tabBtn.dataset.tab;
    const title = document.getElementById("pageTitle");
    const equityView = document.getElementById("equityView");
    const comingSoon = document.getElementById("comingSoonView");

    if (tab === "equity") {
      title.textContent = "Equity + Drawdown";
      equityView.style.display = "block";
      comingSoon.style.display = "none";
    } else {
      title.textContent = tabBtn.textContent;
      equityView.style.display = "none";
      comingSoon.style.display = "block";
    }
  });
});

// ---------- Helpers ----------
function formatCompact(v) {
  // Turns 12345 into "$12.3K", -305 into "-$305", matching the TSB-style labels
  const sign = v < 0 ? "-" : "";
  const abs = Math.abs(v);
  if (abs >= 1000) return sign + "$" + (abs / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return sign + "$" + abs.toLocaleString();
}

// ---------- Data + chart ----------
async function loadChart() {
  const statusEl = document.getElementById("status");
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedData = data;

    if (!data.points || data.points.length === 0) {
      statusEl.textContent = "No trade data returned yet — log some trades first.";
      return;
    }

    renderStats(data.summary);
    renderChart(data.points);

    statusEl.style.display = "none";
    document.getElementById("stats").style.display = "flex";
    document.getElementById("chartWrap").style.display = "block";
  } catch (err) {
    statusEl.textContent =
      "Couldn't reach the server at " + API_URL + " (" + err.message + ")";
  }
}

function renderStats(summary) {
  const statsEl = document.getElementById("stats");
  const pnlClass = summary.final_equity >= summary.starting_balance ? "positive" : "negative";

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Starting balance</div>
      <div class="stat-value">$${summary.starting_balance.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current equity</div>
      <div class="stat-value ${pnlClass}">$${summary.final_equity.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Max drawdown</div>
      <div class="stat-value negative">$${summary.max_drawdown.toLocaleString()}</div>
    </div>
  `;
}

function renderChart(points) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const equity = points.map(p => p.equity);
  const drawdown = points.map(p => p.drawdown);

  const ctx = document.getElementById("equityChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  // Soft vertical gradient fill under the equity line — fades from green to
  // transparent, which is what gives the TSB chart its "glow" look instead
  // of a flat solid fill.
  const equityGradient = ctx.createLinearGradient(0, 0, 0, 380);
  equityGradient.addColorStop(0, "rgba(74, 222, 128, 0.25)");
  equityGradient.addColorStop(1, "rgba(74, 222, 128, 0.0)");

  const drawdownGradient = ctx.createLinearGradient(0, 0, 0, 380);
  drawdownGradient.addColorStop(0, "rgba(248, 113, 113, 0.20)");
  drawdownGradient.addColorStop(1, "rgba(248, 113, 113, 0.0)");

  // Only label a handful of points (first, last, local peaks/troughs) —
  // labeling every single point gets cluttered fast on a real dataset.
  function shouldLabel(i) {
    if (i === 0 || i === equity.length - 1) return true;
    const prev = equity[i - 1], curr = equity[i], next = equity[i + 1];
    return (curr > prev && curr > next) || (curr < prev && curr < next);
  }

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Equity",
          data: equity,
          borderColor: "#4ade80",
          backgroundColor: equityGradient,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          yAxisID: "y",
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: "#4ade80",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "top",
            offset: 6,
            color: textColor,
            font: { size: 11, weight: "500" },
            formatter: (v) => formatCompact(v),
          },
        },
        {
          label: "Drawdown",
          data: drawdown,
          borderColor: "#f87171",
          backgroundColor: drawdownGradient,
          borderWidth: 1.5,
          fill: true,
          tension: 0.35,
          yAxisID: "y1",
          pointRadius: 0,
          pointHoverRadius: 4,
          pointBackgroundColor: "#f87171",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "bottom",
            offset: 6,
            color: mutedColor,
            font: { size: 10 },
            formatter: (v) => formatCompact(v),
          },
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: { color: textColor },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          position: "left",
          grid: { color: gridColor },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
        y1: {
          position: "right",
          suggestedMax: 0,
          grid: { drawOnChartArea: false },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
      },
    },
  });
}

loadChart();
</script>

</body>
</html>
