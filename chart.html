<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equity + Drawdown</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e11;
    --panel: #14181d;
    --card: #181c22;
    --border: #262b33;
    --border-soft: #1e222a;
    --text: #eaecef;
    --muted: #848e9c;
    --green: #0ecb81;
    --green-dim: rgba(14, 203, 129, 0.12);
    --red: #f6465d;
    --red-dim: rgba(246, 70, 93, 0.12);
    --grid: #1a1e24;
    --accent-glow: rgba(14, 203, 129, 0.35);
  }
  body.light {
    --bg: #f8f9fa;
    --panel: #ffffff;
    --card: #ffffff;
    --border: #e7e9ec;
    --border-soft: #eef0f2;
    --text: #12161c;
    --muted: #707a8a;
    --grid: #eef0f2;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
    transition: background 0.15s ease, color 0.15s ease;
    -webkit-font-smoothing: antialiased;
  }

  .mono, .stat-value, .price-mono {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  h1 {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 22px;
    font-weight: 500;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  #themeToggle {
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  #themeToggle:hover {
    border-color: var(--green);
    transform: translateY(-1px);
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 22px;
    overflow-x: auto;
    width: fit-content;
    max-width: 100%;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .tab:hover {
    color: var(--text);
    background: var(--border-soft);
  }
  .tab.active {
    color: #05130d;
    background: var(--green);
  }
  body.light .tab.active {
    color: #ffffff;
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 140px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Inter', sans-serif;
  }
  .stat-value {
    font-size: 21px;
    font-weight: 600;
    margin-top: 5px;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .mainRow {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }
  #chartWrap {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    height: 420px;
  }
  #winLossWrap {
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  #winLossWrap h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px 0;
    font-family: 'Inter', sans-serif;
  }
  .winLossLegend {
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 8px;
  }
  .legendDot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  #status {
    color: var(--muted);
    font-size: 13px;
  }
  .comingSoon {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  /* Trading Consistency Map (Daily tab) */
  .dailyMapHeader { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
  .dailyMapTitle { font-size:15px; font-weight:700; }
  .dailyMapStats { display:flex; gap:10px; }
  .dailyMapStat { background: var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 16px; text-align:center; min-width:64px; }
  .dailyMapStat .num { font-size:16px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .dailyMapStat .lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
  .dailyMapScroll { overflow-x:auto; padding-bottom:6px; }
  .dailyMapMonths { display:flex; margin-left:34px; margin-bottom:4px; }
  .monthLabel { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; }
  .dailyMapBody { display:flex; }
  .dailyMapDayLabels { display:flex; flex-direction:column; gap:3px; margin-right:8px; width:28px; }
  .dayLabel { height:14px; font-size:10px; color:var(--muted); line-height:14px; }
  .dailyMapGrid { display:grid; grid-auto-flow:column; grid-template-rows: repeat(7, 14px); gap:3px; }
  .dayCell { width:14px; height:14px; border-radius:3px; background: var(--border-soft); cursor:default; position:relative; }
  .dayCell:hover::after {
    content: attr(data-tip);
    position:absolute; bottom:120%; left:50%; transform:translateX(-50%);
    background: var(--card); border:1px solid var(--border); color:var(--text);
    font-size:11px; padding:5px 8px; border-radius:6px; white-space:nowrap; z-index:10;
  }
  .dailyMapLegend { display:flex; align-items:center; gap:6px; margin-top:14px; font-size:11px; color:var(--muted); }
  .legendSwatch { width:12px; height:12px; border-radius:3px; display:inline-block; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="pageTitle">Equity + Drawdown</h1>
    <div class="subtitle">Live from your Notion trades database</div>
  </div>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab" data-tab="daily">Daily</button>
  <button class="tab active" data-tab="equity">Equity</button>
  <button class="tab" data-tab="setups">Setups</button>
  <button class="tab" data-tab="monthly">Monthly</button>
  <button class="tab" data-tab="sessions">Sessions</button>
  <button class="tab" data-tab="returns">Return %</button>
  <button class="tab" data-tab="curve">Curve</button>
  <button class="tab" data-tab="accounts">Accounts</button>
</div>

<div id="equityView">
  <div id="status">Loading...</div>
  <div class="stats" id="stats" style="display:none"></div>
  <div class="mainRow" id="mainRow" style="display:none">
    <div id="chartWrap">
      <canvas id="equityChart"></canvas>
    </div>
    <div id="winLossWrap">
      <h3>Win-Loss Ratio</h3>
      <div style="position: relative; flex: 1;">
        <canvas id="winLossChart"></canvas>
      </div>
      <div class="winLossLegend">
        <span><span class="legendDot" style="background:#0ecb81"></span>Win</span>
        <span><span class="legendDot" style="background:#f6465d"></span>Loss</span>
      </div>
    </div>
  </div>
</div>

<div id="comingSoonView" class="comingSoon" style="display:none">
  This view isn't built yet — coming soon.
</div>

<div id="monthlyView" style="display:none">
  <div id="monthlyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="monthlyChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="monthlyChart"></canvas>
  </div>
</div>

<div id="sessionsView" style="display:none">
  <div id="sessionsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="sessionsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="sessionsChart"></canvas>
  </div>
</div>

<div id="setupsView" style="display:none">
  <div id="setupsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="setupsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="setupsChart"></canvas>
  </div>
</div>

<div id="dailyView" style="display:none">
  <div id="dailyStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="dailyMapWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px;">
    <div class="dailyMapHeader">
      <div class="dailyMapTitle">Trading Consistency Map</div>
      <div class="dailyMapStats" id="dailyMapStats"></div>
    </div>
    <div class="dailyMapScroll">
      <div class="dailyMapMonths" id="dailyMapMonths"></div>
      <div class="dailyMapBody">
        <div class="dailyMapDayLabels">
          <div class="dayLabel"></div>
          <div class="dayLabel">Mon</div>
          <div class="dayLabel"></div>
          <div class="dayLabel">Wed</div>
          <div class="dayLabel"></div>
          <div class="dayLabel">Fri</div>
          <div class="dayLabel"></div>
        </div>
        <div class="dailyMapGrid" id="dailyMapGrid"></div>
      </div>
    </div>
    <div class="dailyMapLegend">
      <span>No trade</span>
      <span class="legendSwatch" style="background: var(--border-soft)"></span>
      <span style="margin-left:14px;">Low</span>
      <span class="legendSwatch" style="background:rgba(14,203,129,0.25)"></span>
      <span class="legendSwatch" style="background:rgba(14,203,129,0.5)"></span>
      <span class="legendSwatch" style="background:rgba(14,203,129,0.75)"></span>
      <span class="legendSwatch" style="background:rgba(14,203,129,1)"></span>
      <span>High</span>
      <span id="dailyMapFooter" style="margin-left:auto;"></span>
    </div>
  </div>
</div>

<div id="returnsView" style="display:none">
  <div id="returnsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="returnsChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="returnsChart"></canvas>
  </div>
</div>

<div id="curveView" style="display:none">
  <div id="curveStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="curveChartWrap" style="display:none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; height: 420px;">
    <canvas id="curveChart"></canvas>
  </div>
</div>

<div id="accountsView" style="display:none">
  <div id="accountsStatus" style="color: var(--muted); font-size: 13px;">Loading...</div>
  <div id="accountsCards" style="display:none; display:flex; gap: 20px; flex-wrap: wrap;"></div>
</div>

<script>
Chart.register(ChartDataLabels);

const API_URL = "https://tsb-backend-production.up.railway.app/equity-curve";
const WIN_LOSS_API_URL = "https://tsb-backend-production.up.railway.app/win-loss";

let chartInstance = null;
let winLossChartInstance = null;
let cachedData = null;
let cachedWinLoss = null;

const centerTextPlugin = {
  id: "centerText",
  afterDraw(chart) {
    if (chart.config.type !== "doughnut") return;
    const { ctx, chartArea } = chart;
    const winRate = chart.config._winRate;
    if (winRate === undefined) return;

    const centerX = (chartArea.left + chartArea.right) / 2;
    const centerY = (chartArea.top + chartArea.bottom) / 2;
    const isLight = document.body.classList.contains("light");

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = isLight ? "#1a1a1a" : "#e5e5e5";
    ctx.font = "600 26px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText(winRate + "%", centerX, centerY - 8);
    ctx.fillStyle = isLight ? "#666666" : "#888888";
    ctx.font = "12px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillText("Win Rate", centerX, centerY + 14);
    ctx.restore();
  },
};
Chart.register(centerTextPlugin);

const crosshairPlugin = {
  id: "crosshair",
  afterDraw(chart) {
    if (chart.tooltip?._active?.length) {
      const activePoint = chart.tooltip._active[0];
      const { ctx, chartArea } = chart;
      const x = activePoint.element.x;

      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.lineWidth = 1;
      ctx.strokeStyle = document.body.classList.contains("light") ? "#c4c9d0" : "#3a4048";
      ctx.stroke();
      ctx.restore();
    }
  },
};
Chart.register(crosshairPlugin);

function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  const btn = document.getElementById("themeToggle");
  btn.textContent = isLight ? "☀️" : "🌙";
  if (cachedData) renderChart(cachedData.points);
  if (cachedWinLoss) renderWinLoss(cachedWinLoss);
}
document.querySelectorAll(".tab").forEach(tabBtn => {
  tabBtn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tabBtn.classList.add("active");

    const tab = tabBtn.dataset.tab;
    const title = document.getElementById("pageTitle");
    const equityView = document.getElementById("equityView");
    const comingSoon = document.getElementById("comingSoonView");
    const monthlyView = document.getElementById("monthlyView");
    const sessionsView = document.getElementById("sessionsView");
    const setupsView = document.getElementById("setupsView");
    const dailyView = document.getElementById("dailyView");
    const returnsView = document.getElementById("returnsView");
    const curveView = document.getElementById("curveView");
    const accountsView = document.getElementById("accountsView");

    equityView.style.display = "none";
    comingSoon.style.display = "none";
    monthlyView.style.display = "none";
    sessionsView.style.display = "none";
    setupsView.style.display = "none";
    dailyView.style.display = "none";
    returnsView.style.display = "none";
    curveView.style.display = "none";
    accountsView.style.display = "none";

    if (tab === "equity") {
      title.textContent = "Equity + Drawdown";
      equityView.style.display = "block";
    } else if (tab === "monthly") {
      title.textContent = "Monthly P&L";
      monthlyView.style.display = "block";
      if (!cachedMonthly) loadMonthly();
    } else if (tab === "sessions") {
      title.textContent = "Sessions P&L";
      sessionsView.style.display = "block";
      if (!cachedSessions) loadSessions();
    } else if (tab === "setups") {
      title.textContent = "Setups Performance";
      setupsView.style.display = "block";
      if (!cachedSetups) loadSetups();
    } else if (tab === "daily") {
      title.textContent = "Trading Consistency Map";
      dailyView.style.display = "block";
      if (!cachedDaily) loadDaily();
    } else if (tab === "returns") {
      title.textContent = "Return %";
      returnsView.style.display = "block";
      loadReturns();
    } else if (tab === "curve") {
      title.textContent = "Cumulative R-Multiple Curve";
      curveView.style.display = "block";
      if (!cachedCurve) loadCurve();
    } else if (tab === "accounts") {
      title.textContent = "Accounts";
      accountsView.style.display = "block";
      if (!cachedAccounts) loadAccounts();
    } else {
      title.textContent = tabBtn.textContent;
      comingSoon.style.display = "block";
    }
  });
});

let cachedAccounts = null;

async function loadAccounts() {
  const statusEl = document.getElementById("accountsStatus");
  const cardsEl = document.getElementById("accountsCards");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/accounts");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedAccounts = data.accounts;

    if (!cachedAccounts || cachedAccounts.length === 0) {
      statusEl.textContent = "No accounts found.";
      return;
    }

    renderAccounts(cachedAccounts);
    statusEl.style.display = "none";
    cardsEl.style.display = "flex";
  } catch (err) {
    statusEl.textContent = "Couldn't load accounts data (" + err.message + ")";
  }
}

function renderAccounts(accounts) {
  const cardsEl = document.getElementById("accountsCards");

  cardsEl.innerHTML = accounts.map(acc => {
    const pnlClass = acc.total_pnl >= 0 ? "positive" : "negative";
    const statusColor = acc.status === "Active" ? "#0ecb81" : "#888888";

    return `
      <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-width: 260px; flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div style="font-size: 16px; font-weight: 600;">${acc.name}</div>
          <span style="font-size: 11px; padding: 3px 10px; border-radius: 20px; background: ${statusColor}22; color: ${statusColor};">${acc.status || "—"}</span>
        </div>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 4px;">${acc.type || ""}</div>
        <div style="display: flex; justify-content: space-between; margin-top: 16px;">
          <div>
            <div class="stat-label">Current Balance</div>
            <div class="stat-value">$${acc.current_balance.toLocaleString()}</div>
          </div>
          <div>
            <div class="stat-label">Total P&L</div>
            <div class="stat-value ${pnlClass}">$${acc.total_pnl.toLocaleString()}</div>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 16px;">
          <div>
            <div class="stat-label">Win Rate</div>
            <div class="stat-value">${acc.win_rate}%</div>
          </div>
          <div>
            <div class="stat-label">Trades</div>
            <div class="stat-value">${acc.trades}</div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

let curveChartInstance = null;
let cachedCurve = null;

async function loadCurve() {
  const statusEl = document.getElementById("curveStatus");
  const wrapEl = document.getElementById("curveChartWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/r-curve");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedCurve = data.curve;

    if (!cachedCurve || cachedCurve.length === 0) {
      statusEl.textContent = "No trade data yet.";
      return;
    }

    renderCurve(cachedCurve);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load curve data (" + err.message + ")";
  }
}

function renderCurve(curve) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = curve.map(c => "#" + c.trade_number);
  const cumulativeR = curve.map(c => c.cumulative_r);

  const ctx = document.getElementById("curveChart").getContext("2d");
  if (curveChartInstance) curveChartInstance.destroy();

  const gradient = ctx.createLinearGradient(0, 0, 0, 380);
  gradient.addColorStop(0, "rgba(14, 203, 129, 0.25)");
  gradient.addColorStop(1, "rgba(14, 203, 129, 0.0)");

  curveChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Cumulative R",
        data: cumulativeR,
        borderColor: "#0ecb81",
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.2,
        pointRadius: 3,
        pointBackgroundColor: "#0ecb81",
        datalabels: {
          display: (ctx) => ctx.dataIndex === 0 || ctx.dataIndex === cumulativeR.length - 1,
          align: "top",
          color: textColor,
          font: { size: 11, weight: "500" },
          formatter: (v) => v.toFixed(2) + "R",
        },
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor } },
      },
      scales: {
        x: {
          title: { display: true, text: "Trade #", color: mutedColor },
          grid: { display: false },
          ticks: { color: mutedColor },
        },
        y: {
          title: { display: true, text: "Cumulative R", color: mutedColor },
          grid: { color: gridColor },
          ticks: { color: mutedColor, callback: (v) => v + "R" },
        },
      },
    },
  });
}

let returnsChartInstance = null;

function loadReturns() {
  const statusEl = document.getElementById("returnsStatus");
  const wrapEl = document.getElementById("returnsChartWrap");

  if (!cachedData || !cachedData.points || cachedData.points.length === 0) {
    statusEl.textContent = "Equity data not loaded yet — try the Equity tab first.";
    return;
  }

  renderReturns(cachedData.points, cachedData.summary.starting_balance);
  statusEl.style.display = "none";
  wrapEl.style.display = "block";
}

function renderReturns(points, startingBalance) {
  const isLight = document.body.classList.contains("light");

let cachedDaily = null;

async function loadDaily() {
  const statusEl = document.getElementById("dailyStatus");
  const wrapEl = document.getElementById("dailyMapWrap");
  try {
    const res = await fetch("https://tsb-backend-production.up.railway.app/daily-pnl");
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    cachedDaily = data.days;

    if (!cachedDaily || cachedDaily.length === 0) {
      statusEl.textContent = "No trade data yet.";
      return;
    }

    renderDailyMap(cachedDaily);
    statusEl.style.display = "none";
    wrapEl.style.display = "block";
  } catch (err) {
    statusEl.textContent = "Couldn't load daily data (" + err.message + ")";
  }
}

function renderDailyMap(days) {
  const byDate = {};
  days.forEach(d => { byDate[d.date] = d; });

  const maxTrades = Math.max(1, ...days.map(d => d.trades));

  const today = new Date();
  let start = new Date(today);
  start.setMonth(start.getMonth() - 11); // fixed 12-month rolling window
  start.setDate(1); // align to start of that month for clean labels
  const startDow = (start.getDay() + 6) % 7; // Mon=0 ... Sun=6
  start.setDate(start.getDate() - startDow);

  const gridEl = document.getElementById("dailyMapGrid");
  const monthsEl = document.getElementById("dailyMapMonths");
  gridEl.innerHTML = "";
  monthsEl.innerHTML = "";

  let cursor = new Date(start);
  let col = 0;
  let lastMonth = -1;
  const monthLabels = [];

  while (cursor <= today) {
    if (cursor.getMonth() !== lastMonth) {
      lastMonth = cursor.getMonth();
      const monthName = cursor.toLocaleDateString(undefined, { month: "short" });
      const tradesThisMonth = days.filter(d => {
        const dd = new Date(d.date);
        return dd.getFullYear() === cursor.getFullYear() && dd.getMonth() === cursor.getMonth();
      }).reduce((sum, d) => sum + d.trades, 0);
      monthLabels.push({ col, label: `${monthName} ${tradesThisMonth}t` });
    }

    for (let row = 0; row < 7; row++) {
      const dateStr = cursor.toISOString().slice(0, 10);
      const entry = byDate[dateStr];
      const cell = document.createElement("div");
      cell.className = "dayCell";

      if (!entry || entry.trades === 0) {
        cell.style.background = "var(--border-soft)";
        cell.dataset.tip = `${dateStr} — no trades`;
      } else {
        const intensity = 0.2 + 0.8 * (entry.trades / maxTrades);
        if (entry.outcome === "win") {
          cell.style.background = `rgba(14, 203, 129, ${intensity.toFixed(2)})`;
        } else if (entry.outcome === "loss") {
          cell.style.background = `rgba(246, 70, 93, ${intensity.toFixed(2)})`;
        } else {
          cell.style.background = "var(--border)";
        }
        cell.dataset.tip = `${dateStr} — ${entry.trades} trade${entry.trades > 1 ? "s" : ""}, $${entry.pnl.toFixed(2)}`;
      }

      gridEl.appendChild(cell);
      cursor.setDate(cursor.getDate() + 1);
    }
    col++;
  }

  monthsEl.style.position = "relative";
  monthsEl.style.height = "16px";
  monthLabels.forEach(m => {
    const label = document.createElement("div");
    label.className = "monthLabel";
    label.style.position = "absolute";
    label.style.left = (m.col * 17) + "px";
    label.textContent = m.label;
    monthsEl.appendChild(label);
  });

  const activeDays = days.filter(d => d.trades > 0).map(d => d.date).sort();
  const totalTrades = days.reduce((sum, d) => sum + d.trades, 0);
  const { current, best } = computeStreaks(activeDays);

  document.getElementById("dailyMapStats").innerHTML = `
    <div class="dailyMapStat"><div class="num">${activeDays.length}</div><div class="lbl">Active</div></div>
    <div class="dailyMapStat"><div class="num">${totalTrades}</div><div class="lbl">Trades</div></div>
    <div class="dailyMapStat"><div class="num">${current}</div><div class="lbl">Current</div></div>
    <div class="dailyMapStat"><div class="num">${best}</div><div class="lbl">Best</div></div>
  `;

  const wins = days.filter(d => d.outcome === "win").length;
  const losses = days.filter(d => d.outcome === "loss").length;
  document.getElementById("dailyMapFooter").textContent =
    `${activeDays.length} active days · ${wins} green · ${losses} red · intensity = trades logged`;
}

function computeStreaks(sortedDates) {
  if (sortedDates.length === 0) return { current: 0, best: 0 };
  let best = 1, run = 1;
  for (let i = 1; i < sortedDates.length; i++) {
    const diffDays = Math.round((new Date(sortedDates[i]) - new Date(sortedDates[i - 1])) / 86400000);
    run = diffDays <= 3 ? run + 1 : 1;
    best = Math.max(best, run);
  }
  let current = 1;
  for (let i = sortedDates.length - 1; i > 0; i--) {
    const diffDays = Math.round((new Date(sortedDates[i]) - new Date(sortedDates[i - 1])) / 86400000);
    if (diffDays <= 3) current++;
    else break;
  }
  return { current, best };
}

function formatCompact(v) {
  const sign = v < 0 ? "-" : "";
  const abs = Math.abs(v);
  if (abs >= 1000) return sign + "$" + (abs / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return sign + "$" + abs.toLocaleString();
}

async function loadChart() {
  const statusEl = document.getElementById("status");
  try {
    const [equityRes, winLossRes] = await Promise.all([
      fetch(API_URL),
      fetch(WIN_LOSS_API_URL),
    ]);

    if (!equityRes.ok) throw new Error(`Equity server responded ${equityRes.status}`);
    const data = await equityRes.json();
    cachedData = data;

    if (!data.points || data.points.length === 0) {
      statusEl.textContent = "No trade data returned yet — log some trades first.";
      return;
    }

    if (winLossRes.ok) {
      cachedWinLoss = await winLossRes.json();
      renderWinLoss(cachedWinLoss);
    }

    renderStats(data.summary);
    renderChart(data.points);

    statusEl.style.display = "none";
    document.getElementById("stats").style.display = "flex";
    document.getElementById("mainRow").style.display = "flex";
  } catch (err) {
    statusEl.textContent =
      "Couldn't reach the server at " + API_URL + " (" + err.message + ")";
  }
}

function renderStats(summary) {
  const statsEl = document.getElementById("stats");
  const pnlClass = summary.final_equity >= summary.starting_balance ? "positive" : "negative";

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Starting balance</div>
      <div class="stat-value">$${summary.starting_balance.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current equity</div>
      <div class="stat-value ${pnlClass}">$${summary.final_equity.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Max drawdown</div>
      <div class="stat-value negative">$${summary.max_drawdown.toLocaleString()}</div>
    </div>
  `;
}

function renderChart(points) {
  const isLight = document.body.classList.contains("light");
  const textColor = isLight ? "#1a1a1a" : "#e5e5e5";
  const mutedColor = isLight ? "#666666" : "#888888";
  const gridColor = isLight ? "#eeeeee" : "#1f1f1f";

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const equity = points.map(p => p.equity);
  const drawdown = points.map(p => p.drawdown);

  const ctx = document.getElementById("equityChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  const equityGradient = ctx.createLinearGradient(0, 0, 0, 380);
  equityGradient.addColorStop(0, "rgba(14, 203, 129, 0.25)");
  equityGradient.addColorStop(1, "rgba(14, 203, 129, 0.0)");

  const drawdownGradient = ctx.createLinearGradient(0, 0, 0, 380);
  drawdownGradient.addColorStop(0, "rgba(246, 70, 93, 0.20)");
  drawdownGradient.addColorStop(1, "rgba(246, 70, 93, 0.0)");

  function shouldLabel(i) {
    if (i === 0 || i === equity.length - 1) return true;
    const prev = equity[i - 1], curr = equity[i], next = equity[i + 1];
    return (curr > prev && curr > next) || (curr < prev && curr < next);
  }

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Equity",
          data: equity,
          borderColor: "#0ecb81",
          backgroundColor: equityGradient,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          yAxisID: "y",
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: "#0ecb81",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "top",
            offset: 6,
            color: textColor,
            font: { size: 11, weight: "500" },
            formatter: (v) => formatCompact(v),
          },
        },
        {
          label: "Drawdown",
          data: drawdown,
          borderColor: "#f6465d",
          backgroundColor: drawdownGradient,
          borderWidth: 1.5,
          fill: true,
          tension: 0.35,
          yAxisID: "y1",
          pointRadius: 0,
          pointHoverRadius: 4,
          pointBackgroundColor: "#f6465d",
          datalabels: {
            display: (ctx) => shouldLabel(ctx.dataIndex),
            align: "bottom",
            offset: 6,
            color: mutedColor,
            font: { size: 10 },
            formatter: (v) => formatCompact(v),
          },
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: { color: textColor, font: { family: "'Inter', sans-serif", size: 12, weight: '600' } },
        },
        tooltip: {
          backgroundColor: isLight ? "#ffffff" : "#181c22",
          titleColor: textColor,
          bodyColor: textColor,
          borderColor: "#0ecb81",
          borderWidth: 1,
          padding: 10,
          titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12, weight: '600' },
          displayColors: true,
          boxPadding: 4,
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: mutedColor, maxTicksLimit: 8 },
        },
        y: {
          position: "left",
          grid: { color: gridColor },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
        y1: {
          position: "right",
          suggestedMax: 0,
          grid: { drawOnChartArea: false },
          ticks: {
            color: mutedColor,
            callback: (v) => formatCompact(v),
          },
        },
      },
    },
  });
}
