<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticker</title>
<style>
  body {
    background: #0a0a0a;
    margin: 0;
    padding: 10px 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    overflow: hidden;
  }

  /* Outer mask so the scrolling row appears to fade in/out at the edges */
  .tickerViewport {
    width: 100%;
    overflow: hidden;
    position: relative;
  }

  /* The scrolling track holds the item list TWICE back to back, so when
     the first copy scrolls fully out of view, the second copy is right
     there to continue seamlessly — that's what makes it loop forever
     without a visible jump or reset. */
  .tickerTrack {
    display: flex;
    width: max-content;
    animation: scrollLeft 40s linear infinite;
  }
  .tickerTrack:hover {
    animation-play-state: paused;
  }

  @keyframes scrollLeft {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .item {
    display: flex;
    flex-direction: column;
    min-width: 100px;
    padding: 0 20px;
    border-right: 1px solid #1f1f1f;
  }
  .symbol {
    color: #888;
    font-size: 11px;
  }
  .price {
    color: #e5e5e5;
    font-size: 15px;
    font-weight: 600;
  }
  .change {
    font-size: 11px;
    font-weight: 500;
  }
  .up { color: #4ade80; }
  .down { color: #f87171; }
</style>
</head>
<body>

<div class="tickerViewport">
  <div class="tickerTrack" id="tickerTrack">Loading...</div>
</div>

<script>
const TICKER_URL = "https://tsb-backend-production.up.railway.app/ticker";

function renderItem(item) {
  if (item.error) {
    return `<div class="item"><span class="symbol">${item.symbol}</span><span class="price">--</span></div>`;
  }
  const isUp = item.change_pct >= 0;
  const arrow = isUp ? "▲" : "▼";
  const cls = isUp ? "up" : "down";
  const priceDisplay = item.price < 1
    ? item.price.toFixed(4)
    : item.price.toLocaleString(undefined, { maximumFractionDigits: 2 });

  return `
    <div class="item">
      <span class="symbol">${item.symbol}</span>
      <span class="price">$${priceDisplay}</span>
      <span class="change ${cls}">${arrow} ${item.change_pct.toFixed(2)}%</span>
    </div>
  `;
}

async function loadTicker() {
  const track = document.getElementById("tickerTrack");
  try {
    const res = await fetch(TICKER_URL);
    const data = await res.json();

    // Build the item list once, then duplicate it — this pair of identical
    // copies placed side by side is what the scrollLeft animation relies on
    // for a seamless infinite loop (see the CSS comment above).
    const itemsHtml = data.ticker.map(renderItem).join("");
    track.innerHTML = itemsHtml + itemsHtml;
  } catch (err) {
    track.textContent = "Couldn't load ticker: " + err.message;
  }
}

loadTicker();
setInterval(loadTicker, 30000); // refresh prices every 30s; animation keeps scrolling regardless
</script>

</body>
</html>
